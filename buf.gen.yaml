version: v1
plugins:
  - plugin: go
    out: gen
    opt:
      - paths=source_relative
  - plugin: connect-go
    out: gen
    opt:
      - paths=source_relative
  # TypeScript frontend (new)
  - plugin: es
    path: frontend/node_modules/.bin/protoc-gen-es
    out: frontend/src/gen
    opt: target=ts
