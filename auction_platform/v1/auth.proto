syntax = "proto3";

package auction_platform.v1;

option go_package = "github.com/KrishnaGrg1/auction_platform/gen/auction_platform/v1;auction_platformv1";


import "google/protobuf/timestamp.proto";
import "buf/validate/validate.proto";

service AuthService {
    rpc Register(RegisterRequest) returns (RegisterResponse);
    rpc Verify(VerifyRequest) returns (VerifyResponse);
    rpc Login(LoginRequest) returns (LoginResponse);
}

message User {
  string id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  int32 available_balance = 5;
  int32 held_balance = 6;
  bool is_verified = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message RegisterRequest {
  string first_name = 1 [
    (buf.validate.field).string = {
      min_len: 1,
      max_len: 50
    }
  ];

  string last_name = 2 [
    (buf.validate.field).string = {
      min_len: 1,
      max_len: 50
    }
  ];

  string email = 3 [
    (buf.validate.field).string.email = true
  ];

  string password = 4 [
    (buf.validate.field).string = {
      min_len: 8,
      max_len: 100
    }
  ];
}

message RegisterResponse{
    User user = 1;
    string message = 2;
    google.protobuf.Timestamp timestamp = 3;
}

message VerifyRequest {
  string user_id = 1 [
    (buf.validate.field).string.uuid = true
  ];

  string code = 2 [
    (buf.validate.field).string = {
      len: 6
      pattern: "^[0-9]+$"
    }
  ];
}


message VerifyResponse {
  string token = 1;
  User user = 2;
  string message = 3;
  google.protobuf.Timestamp timestamp = 4;
}


// LOGIN
message LoginRequest {
  string email = 1 [
    (buf.validate.field).string.email = true
  ];

  string password = 2 [
    (buf.validate.field).string = {
      min_len: 8,
      max_len: 100
    }
  ];
}

message LoginResponse {
  string token = 1;
  User user = 2;
  string message = 3;
  google.protobuf.Timestamp timestamp = 4;
}
